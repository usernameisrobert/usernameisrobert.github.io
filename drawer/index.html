<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USB Shared Canvas</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- QRCode library for automatic joining -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { touch-action: none; overflow: hidden; background-color: #f3f4f6; }
        canvas { 
            cursor: crosshair; 
            touch-action: none; 
            background-color: white;
            image-rendering: auto;
            display: block;
        }
        #canvas-container {
            aspect-ratio: 1 / 1;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Scale the canvas to fit the smaller dimension of the container */
        #canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Mobile side controls */
        @media (max-width: 768px) {
            .side-controls {
                flex-direction: column !important;
                right: 1rem !important;
                left: auto !important;
                top: 50% !important;
                transform: translateY(-50%) !important;
                bottom: auto !important;
                padding: 1.25rem 0.75rem !important;
                border-radius: 9999px !important;
            }
            .side-controls input[type="range"] {
                writing-mode: bt-lr; /* Vertical range */
                appearance: slider-vertical;
                width: 12px;
                height: 120px;
            }
        }
    </style>
</head>
<body class="flex flex-col h-screen font-sans bg-gray-900">

    <!-- Header / Connection UI -->
    <div id="setup" class="bg-white p-4 shadow-md flex flex-col md:flex-row items-center justify-between gap-4 z-20">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-red-500" id="status-dot"></div>
            <span id="status-text" class="text-sm font-medium text-gray-600">Disconnected</span>
        </div>

        <div id="host-controls" class="flex items-center gap-4">
            <button onclick="startHosting()" id="host-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Host Session</button>
            <div id="id-display" class="hidden flex flex-col items-center gap-2 bg-gray-100 p-3 rounded border">
                <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-500 font-bold uppercase">Scan to Join:</span>
                    <code id="my-id" class="font-bold text-blue-700"></code>
                </div>
                <div id="qrcode" class="bg-white p-2"></div>
            </div>
        </div>

        <div id="join-controls" class="flex gap-2 w-full md:w-auto">
            <input type="text" id="join-id" placeholder="Enter Host ID" class="border p-2 rounded-lg flex-grow md:w-40 text-sm">
            <button onclick="joinSession()" id="join-btn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">Join</button>
        </div>
    </div>

    <!-- Canvas Area -->
    <div class="flex-grow flex items-center justify-center p-4 relative overflow-hidden">
        <div id="canvas-container">
            <canvas id="canvas"></canvas>
        </div>
        
        <!-- Fullscreen Toggle (Visible on Mobile) -->
        <button onclick="toggleFullscreen()" class="md:hidden absolute top-4 right-4 bg-white/20 backdrop-blur p-2 rounded-full text-white z-10 border border-white/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>

        <!-- Toolbar / Side Controls -->
        <div id="toolbar" class="side-controls absolute bottom-8 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur shadow-2xl border border-gray-200 rounded-full px-6 py-3 flex items-center gap-6 z-10">
            <input type="color" id="colorPicker" value="#2563eb" class="w-10 h-10 rounded-full border-none cursor-pointer overflow-hidden p-0">
            <input type="range" id="sizePicker" min="1" max="50" value="5" class="w-24 accent-blue-600">
            <button onclick="confirmClear()" class="text-gray-500 hover:text-red-500 transition p-2" title="Clear Canvas">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizePicker = document.getElementById('sizePicker');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        // Fixed internal resolution for consistent drawing
        const INTERNAL_RES = 1024;
        canvas.width = INTERNAL_RES;
        canvas.height = INTERNAL_RES;

        let peer = null;
        let connection = null;
        let isDrawing = false;
        let lastPos = { x: 0, y: 0 };

        // Handle scaling for mouse/touch
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            // Map CSS display pixels to internal 1024x1024 coordinates
            const x = (clientX - rect.left) * (INTERNAL_RES / rect.width);
            const y = (clientY - rect.top) * (INTERNAL_RES / rect.height);
            
            return { x, y };
        }

        function draw(x1, y1, x2, y2, color, size, emit = true) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.closePath();

            if (emit && connection && connection.open) {
                connection.send({
                    type: 'draw',
                    data: { x1, y1, x2, y2, color, size }
                });
            }
        }

        function clearCanvas(emit = true) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (emit && connection && connection.open) {
                connection.send({ type: 'clear' });
            }
        }

        function confirmClear() {
            if (confirm("Clear the entire canvas?")) {
                clearCanvas(true);
            }
        }

        function handleStart(e) {
            isDrawing = true;
            lastPos = getPos(e);
        }

        function handleMove(e) {
            if (!isDrawing) return;
            const currentPos = getPos(e);
            draw(lastPos.x, lastPos.y, currentPos.x, currentPos.y, colorPicker.value, sizePicker.value);
            lastPos = currentPos;
            if (e.cancelable) e.preventDefault();
        }

        function handleEnd() {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart, { passive: false });
        canvas.addEventListener('touchmove', handleMove, { passive: false });
        window.addEventListener('touchend', handleEnd);

        // UI Helpers
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function updateStatus(state, msg) {
            statusText.innerText = msg;
            statusDot.className = `w-3 h-3 rounded-full ${state === 'connected' ? 'bg-green-500' : state === 'pending' ? 'bg-yellow-500' : 'bg-red-500'}`;
        }

        function setupConnection(conn) {
            connection = conn;
            connection.on('open', () => {
                updateStatus('connected', 'Connected to Peer');
                document.getElementById('setup').classList.add('hidden');
            });

            connection.on('data', (payload) => {
                if (payload.type === 'draw') {
                    const { x1, y1, x2, y2, color, size } = payload.data;
                    draw(x1, y1, x2, y2, color, size, false);
                } else if (payload.type === 'clear') {
                    clearCanvas(false);
                }
            });

            connection.on('close', () => {
                updateStatus('disconnected', 'Connection Closed');
                document.getElementById('setup').classList.remove('hidden');
            });
        }

        function generateQR(id) {
            const url = new URL(window.location.href);
            url.searchParams.set('join', id);
            
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), {
                text: url.toString(),
                width: 128,
                height: 128
            });
        }

        function startHosting() {
            peer = new Peer();
            updateStatus('pending', 'Generating ID...');
            
            peer.on('open', (id) => {
                document.getElementById('my-id').innerText = id;
                document.getElementById('id-display').classList.remove('hidden');
                document.getElementById('host-btn').classList.add('hidden');
                generateQR(id);
                updateStatus('pending', 'Waiting for partner...');
            });

            peer.on('connection', (conn) => {
                setupConnection(conn);
            });
        }

        function joinSession(targetId) {
            const id = targetId || document.getElementById('join-id').value.trim();
            if (!id) return;
            
            peer = new Peer();
            updateStatus('pending', 'Connecting...');
            
            peer.on('open', () => {
                const conn = peer.connect(id);
                setupConnection(conn);
            });

            peer.on('error', (err) => {
                console.error(err);
                updateStatus('disconnected', 'Failed to connect');
            });
        }

        // Auto-join if ID is in URL
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const joinId = urlParams.get('join');
            if (joinId) {
                document.getElementById('join-id').value = joinId;
                joinSession(joinId);
            }
        };
    </script>
</body>
</html>
