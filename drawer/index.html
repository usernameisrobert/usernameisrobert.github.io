<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>USB Shared Canvas</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: none; overflow: hidden; background-color: #f3f4f6; }
        canvas { cursor: crosshair; touch-action: none; }
        .controls { z-index: 10; }
    </style>
</head>
<body class="flex flex-col h-screen font-sans">

    <!-- Header / Connection UI -->
    <div id="setup" class="bg-white p-4 shadow-md flex flex-col md:flex-row items-center justify-between gap-4">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-red-500" id="status-dot"></div>
            <span id="status-text" class="text-sm font-medium text-gray-600">Disconnected</span>
        </div>

        <div id="host-controls" class="flex gap-2">
            <button onclick="startHosting()" id="host-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Host Session</button>
            <div id="id-display" class="hidden items-center gap-2 bg-gray-100 px-3 py-2 rounded border">
                <span class="text-xs text-gray-500">ID:</span>
                <code id="my-id" class="font-bold text-blue-700"></code>
            </div>
        </div>

        <div id="join-controls" class="flex gap-2 w-full md:w-auto">
            <input type="text" id="join-id" placeholder="Enter Host ID" class="border p-2 rounded-lg flex-grow md:w-40 text-sm">
            <button onclick="joinSession()" id="join-btn" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">Join</button>
        </div>
    </div>

    <!-- Canvas Area -->
    <div class="relative flex-grow bg-white m-4 rounded-xl shadow-inner overflow-hidden border border-gray-200">
        <canvas id="canvas"></canvas>
        
        <!-- Toolbar -->
        <div class="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur shadow-lg border rounded-full px-6 py-3 flex items-center gap-6">
            <input type="color" id="colorPicker" value="#2563eb" class="w-8 h-8 rounded-full border-none cursor-pointer">
            <input type="range" id="sizePicker" min="1" max="20" value="5" class="w-24 accent-blue-600">
            <button onclick="clearCanvas(true)" class="text-gray-500 hover:text-red-500 transition">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const sizePicker = document.getElementById('sizePicker');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        
        let peer = null;
        let connection = null;
        let isDrawing = false;
        let lastPos = { x: 0, y: 0 };

        // Resize canvas to fill parent
        function resize() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }
        window.addEventListener('resize', resize);
        resize();

        // Drawing Logic
        function draw(x1, y1, x2, y2, color, size, emit = true) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = size;
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.closePath();

            if (emit && connection && connection.open) {
                connection.send({
                    type: 'draw',
                    data: { x1, y1, x2, y2, color, size }
                });
            }
        }

        function clearCanvas(emit = true) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (emit && connection && connection.open) {
                connection.send({ type: 'clear' });
            }
        }

        // Mouse/Touch Events
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function handleStart(e) {
            isDrawing = true;
            lastPos = getPos(e);
        }

        function handleMove(e) {
            if (!isDrawing) return;
            const currentPos = getPos(e);
            draw(lastPos.x, lastPos.y, currentPos.x, currentPos.y, colorPicker.value, sizePicker.value);
            lastPos = currentPos;
        }

        function handleEnd() {
            isDrawing = false;
        }

        canvas.addEventListener('mousedown', handleStart);
        canvas.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', handleEnd);
        canvas.addEventListener('touchstart', handleStart);
        canvas.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', handleEnd);

        // Networking Logic
        function updateStatus(state, msg) {
            statusText.innerText = msg;
            statusDot.className = `w-3 h-3 rounded-full ${state === 'connected' ? 'bg-green-500' : state === 'pending' ? 'bg-yellow-500' : 'bg-red-500'}`;
        }

        function setupConnection(conn) {
            connection = conn;
            connection.on('open', () => {
                updateStatus('connected', 'Connected to Peer');
                document.getElementById('setup').classList.add('hidden'); // Hide setup UI once connected
            });

            connection.on('data', (payload) => {
                if (payload.type === 'draw') {
                    const { x1, y1, x2, y2, color, size } = payload.data;
                    draw(x1, y1, x2, y2, color, size, false);
                } else if (payload.type === 'clear') {
                    clearCanvas(false);
                }
            });

            connection.on('close', () => {
                updateStatus('disconnected', 'Connection Closed');
                document.getElementById('setup').classList.remove('hidden');
            });
        }

        function startHosting() {
            peer = new Peer();
            updateStatus('pending', 'Generating ID...');
            
            peer.on('open', (id) => {
                document.getElementById('my-id').innerText = id;
                document.getElementById('id-display').classList.remove('hidden');
                document.getElementById('host-btn').classList.add('hidden');
                updateStatus('pending', 'Waiting for partner...');
            });

            peer.on('connection', (conn) => {
                setupConnection(conn);
            });
        }

        function joinSession() {
            const id = document.getElementById('join-id').value.trim();
            if (!id) return;
            
            peer = new Peer();
            updateStatus('pending', 'Connecting...');
            
            peer.on('open', () => {
                const conn = peer.connect(id);
                setupConnection(conn);
            });

            peer.on('error', (err) => {
                console.error(err);
                updateStatus('disconnected', 'Failed to connect');
            });
        }
    </script>
</body>
</html>
