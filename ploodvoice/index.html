<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PICO-8 Tilted Saw Synth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .key-active { transform: translateY(2px); filter: brightness(1.2); box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .white-key { height: 160px; width: 60px; border: 1px solid #333; border-radius: 0 0 6px 6px; background: #eee; transition: all 0.1s; }
        .black-key { height: 100px; width: 40px; margin-left: -20px; margin-right: -20px; z-index: 10; border-radius: 0 0 4px 4px; background: #111; color: white; border: 1px solid #444; position: relative; transition: all 0.1s; }
        .recording-pulse { animation: pulse 1s infinite; background-color: #ef4444 !important; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pico-border { border: 4px solid #1d1d1d; image-rendering: pixelated; }
        #canvas { width: 100%; height: 100px; background: #000; border: 2px solid #5f574f; }
    </style>
</head>
<body class="bg-black text-zinc-100 min-h-screen flex flex-col items-center justify-center p-4 font-mono">

    <div class="max-w-2xl w-full bg-[#1d1d1d] p-1 pico-border rounded-lg shadow-2xl">
        <div class="bg-[#ff004d] p-4 text-white flex justify-between items-center mb-1">
            <h1 class="text-2xl font-bold tracking-tighter uppercase italic">Tilted Saw Engine</h1>
            <div id="status" class="bg-black text-[#ff004d] px-3 py-1 text-xs">READY</div>
        </div>

        <div class="bg-zinc-900 p-6">
            <!-- Wave Visualizer -->
            <div class="mb-6">
                <div class="text-[10px] text-[#5f574f] mb-1 uppercase tracking-widest">Oscilloscope</div>
                <canvas id="canvas"></canvas>
            </div>

            <!-- Recording Controls -->
            <div class="flex items-center justify-between mb-8 bg-black/40 p-4 rounded border border-zinc-800">
                <button id="recBtn" class="flex items-center gap-3 px-6 py-3 bg-[#5f574f] hover:bg-zinc-600 rounded font-bold transition-all active:scale-95 text-xs uppercase tracking-widest text-white">
                    <span id="recDot" class="w-3 h-3 bg-zinc-400 rounded-full"></span>
                    <span id="recText">Record .WAV</span>
                </button>
                <div class="text-[10px] text-zinc-500 text-right leading-tight">
                    GEOMETRY: ASYMMETRIC<br>
                    SLOPE: TILTED_UP
                </div>
            </div>

            <!-- Keyboard Visualizer -->
            <div class="flex justify-center items-start select-none py-4 bg-black rounded-lg mb-6 border-b-8 border-zinc-800">
                <div class="flex relative">
                    <div id="key-A" class="white-key flex flex-col justify-end items-center pb-4 text-zinc-400 font-bold">A</div>
                    <div class="relative"><div id="key-W" class="black-key flex flex-col justify-end items-center pb-4 text-[9px] absolute">W</div></div>
                    <div id="key-S" class="white-key flex flex-col justify-end items-center pb-4 text-zinc-400 font-bold">S</div>
                    <div class="relative"><div id="key-E" class="black-key flex flex-col justify-end items-center pb-4 text-[9px] absolute">E</div></div>
                    <div id="key-D" class="white-key flex flex-col justify-end items-center pb-4 text-zinc-400 font-bold">D</div>
                    <div id="key-F" class="white-key flex flex-col justify-end items-center pb-4 text-zinc-400 font-bold">F</div>
                    <div class="relative"><div id="key-T" class="black-key flex flex-col justify-end items-center pb-4 text-[9px] absolute">T</div></div>
                    <div id="key-G" class="white-key flex flex-col justify-end items-center pb-4 text-zinc-400 font-bold">G</div>
                    <div class="relative"><div id="key-Y" class="black-key flex flex-col justify-end items-center pb-4 text-[9px] absolute">Y</div></div>
                    <div id="key-H" class="white-key flex flex-col justify-end items-center pb-4 text-zinc-400 font-bold">H</div>
                    <div class="relative"><div id="key-U" class="black-key flex flex-col justify-end items-center pb-4 text-[9px] absolute">U</div></div>
                    <div id="key-J" class="white-key flex flex-col justify-end items-center pb-4 text-zinc-400 font-bold">J</div>
                    <div id="key-K" class="white-key flex flex-col justify-end items-center pb-4 text-zinc-400 font-bold">K</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const GLIDE_TIME = 0.08;
        const keyMap = {
            'a': 261.63, 'w': 277.18, 's': 293.66, 'e': 311.13, 'd': 329.63,
            'f': 349.23, 't': 369.99, 'g': 392.00, 'y': 415.30, 'h': 440.00,
            'u': 466.16, 'j': 493.88, 'k': 523.25
        };

        let audioCtx, osc, gainNode, destination, analyser, dataArray;
        let mediaRecorder, recordedChunks = [], isRecording = false;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Generate a tilted triangle (slow rise, faster fall)
            // We use many harmonics to sharpen the "drop" part of the slope
            const terms = 128;
            const real = new Float32Array(terms);
            const imag = new Float32Array(terms);
            for (let n = 1; n < terms; n++) {
                // The tilt comes from adjusting the phase shift across harmonics
                // imag[n] provides the basic triangle/saw structure
                // adding real[n] components "skews" the symmetry
                imag[n] = (1 / (n * n)) * Math.sin(n * Math.PI * 0.85); 
                real[n] = (1 / (n * n)) * Math.cos(n * Math.PI * 0.85);
            }
            const tiltedWave = audioCtx.createPeriodicWave(real, imag);

            osc = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            analyser = audioCtx.createAnalyser();
            destination = audioCtx.createMediaStreamDestination();

            osc.setPeriodicWave(tiltedWave);
            analyser.fftSize = 2048;
            dataArray = new Uint8Array(analyser.frequencyBinCount);

            osc.connect(gainNode);
            gainNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            gainNode.connect(destination);

            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            osc.start();
            draw();
        }

        // Visualization
        const canvas = document.getElementById('canvas');
        const canvasCtx = canvas.getContext('2d');
        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            canvasCtx.fillStyle = '#000';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#29adff';
            canvasCtx.beginPath();
            let sliceWidth = canvas.width * 1.0 / analyser.frequencyBinCount;
            let x = 0;
            for(let i = 0; i < analyser.frequencyBinCount; i++) {
                let v = dataArray[i] / 128.0;
                let y = v * canvas.height / 2;
                if(i === 0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
                x += sliceWidth;
            }
            canvasCtx.lineTo(canvas.width, canvas.height/2);
            canvasCtx.stroke();
        }

        // Recording logic
        const recBtn = document.getElementById('recBtn');
        const recText = document.getElementById('recText');
        const status = document.getElementById('status');
        const recDot = document.getElementById('recDot');

        recBtn.onclick = () => {
            if (!audioCtx) initAudio();
            if (!isRecording) {
                recordedChunks = [];
                mediaRecorder = new MediaRecorder(destination.stream);
                mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
                mediaRecorder.onstop = exportWav;
                mediaRecorder.start();
                isRecording = true;
                recText.innerText = "STOP & SAVE";
                recDot.classList.add('recording-pulse');
                status.innerText = "RECORDING";
            } else {
                mediaRecorder.stop();
                isRecording = false;
                recText.innerText = "RECORD .WAV";
                recDot.classList.remove('recording-pulse');
                status.innerText = "SAVED";
            }
        };

        function exportWav() {
            const blob = new Blob(recordedChunks, { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tilted-saw-${Date.now()}.wav`;
            a.click();
        }

        const activeKeys = new Set();
        window.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keyMap[key] && !activeKeys.has(key)) {
                if (!audioCtx) initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                activeKeys.add(key);
                osc.frequency.setTargetAtTime(keyMap[key], audioCtx.currentTime, GLIDE_TIME);
                gainNode.gain.setTargetAtTime(0.4, audioCtx.currentTime, 0.01);
                document.getElementById(`key-${key.toUpperCase()}`)?.classList.add('key-active');
                status.innerText = `PLAYING: ${key.toUpperCase()}`;
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (activeKeys.has(key)) {
                activeKeys.delete(key);
                document.getElementById(`key-${key.toUpperCase()}`)?.classList.remove('key-active');
                if (activeKeys.size === 0) {
                    gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
                    status.innerText = isRecording ? "RECORDING" : "IDLE";
                } else {
                    const lastKey = Array.from(activeKeys).pop();
                    osc.frequency.setTargetAtTime(keyMap[lastKey], audioCtx.currentTime, GLIDE_TIME);
                    status.innerText = `PLAYING: ${lastKey.toUpperCase()}`;
                }
            }
        });
    </script>
</body>
</html>
